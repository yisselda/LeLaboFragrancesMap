name: Scrape Le Labo City Exclusives

on:
  schedule:
    - cron: "0 9 * * 1" # Monday 9am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Create PR if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update city exclusives data"
          title: "Update city exclusives data"
          body: "Automated update from Le Labo city exclusives scraper."
          branch: scraper/update-data
          delete-branch: true
